<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Olena Makarova | Portfolio{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary: #4f46e5; /* Vibrant Indigo */
            --secondary: #0f172a; /* Deep Navy */
            --accent: #f59e0b; /* Amber */
            --bg: #ffffff;
            --text-main: #1e293b;
            --text-bold: #0f172a;
            --text-muted: #475569;
            --border-bold: 2px solid #0f172a;
            --neo-shadow: 8px 8px 0px #0f172a;
            --neo-shadow-hover: 4px 4px 0px #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: var(--text-main);
            line-height: 1.7;
            overflow-x: hidden;
            padding-top: 120px; /* Offset for fixed navbar */
        }

        /* Structured Navigation */
        .navbar {
            background-color: white;
            border-bottom: var(--border-bold);
            padding: 1.2rem 0;
        }

        .navbar-brand {
            font-weight: 900;
            letter-spacing: -2px;
            color: var(--text-bold) !important;
            font-size: 2rem;
            text-transform: uppercase;
        }

        .nav-link {
            font-weight: 700;
            color: var(--text-bold) !important;
            margin: 0 0.5rem;
            padding: 0.5rem 1rem !important;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--accent);
            border: var(--border-bold);
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px var(--secondary);
        }

        /* Structural Cards */
        .card {
            background: white;
            border: var(--border-bold);
            border-radius: 0px; /* Sharp, modern look */
            box-shadow: var(--neo-shadow);
            transition: all 0.2s ease;
            margin-bottom: 2rem;
        }

        .card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--secondary);
        }

        /* Bold Typography */
        h1, h2, h3, h4, h5 {
            color: var(--text-bold);
            font-weight: 900;
            letter-spacing: -1px;
        }

        .display-2 {
            font-size: clamp(3rem, 8vw, 5rem);
            line-height: 0.9;
            text-transform: uppercase;
        }

        /* High-Visibility Buttons */
        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: var(--border-bold);
            border-radius: 0px;
            padding: 1rem 2rem;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px var(--secondary);
            transition: all 0.1s ease;
        }

        .btn-primary:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--secondary);
            background-color: var(--primary);
        }

        .btn-outline-primary {
            background-color: white;
            color: var(--text-bold);
            border: var(--border-bold);
            border-radius: 0px;
            padding: 1rem 2rem;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px var(--secondary);
        }

        .btn-outline-primary:hover {
            background-color: var(--accent);
            color: var(--text-bold);
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--secondary);
        }

        .section-title {
            display: inline-block;
            background: var(--accent);
            padding: 0.5rem 2rem;
            border: var(--border-bold);
            box-shadow: 6px 6px 0px var(--secondary);
            margin-bottom: 3rem;
            transform: rotate(-1deg);
        }

        .badge-skill {
            background: white;
            color: var(--text-bold);
            border: var(--border-bold);
            padding: 0.8rem 1.5rem;
            font-weight: 800;
            box-shadow: 4px 4px 0px var(--secondary);
            display: inline-block;
            margin: 0.5rem;
        }

        /* Visibility tweaks */
        p, li, .text-muted {
            color: var(--text-main) !important;
            font-weight: 500;
        }

        footer {
            background: var(--secondary);
            color: white;
            border-top: 10px solid var(--accent);
            padding: 80px 0;
        }

        .bg-grid {
            background-image: radial-gradient(var(--text-muted) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            opacity: 0.1;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">OLENA.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'projects' %}">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'skills' %}">Skills</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'resume' %}">Resume</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-primary px-4 mt-2 mt-lg-0" href="{% url 'contact' %}">Hire Me</a></li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer>
        <div class="container text-center">
            <div class="mb-4">
                {% if profile.linkedin %}
                    <a href="{{ profile.linkedin }}" target="_blank" class="text-dark me-3 fs-4"><i class="bi bi-linkedin"></i></a>
                {% endif %}
                {% if profile.github %}
                    <a href="{{ profile.github }}" target="_blank" class="text-dark me-3 fs-4"><i class="bi bi-github"></i></a>
                {% endif %}
            </div>
            <p class="text-muted mb-0">&copy; 2026 Olena Makarova. MSIS @ Baylor University.</p>
        </div>
    </footer>

    <!-- Chatbase Chatbot -->
    <script>
    (function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...arguments)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(arguments)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="0sxy1LszoNGN3eEgmu7Kj";script.domain="www.chatbase.co";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})();
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
