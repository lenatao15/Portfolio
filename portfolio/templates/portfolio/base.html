<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Olena Makarova | Portfolio{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary: #8b5cf6; /* Soft Violet */
            --secondary: #64748b; /* Muted Slate */
            --accent: #fda4af; /* Soft Rose */
            --bg: #fffbfb; /* Very light rose tint */
            --text-main: #334155;
            --text-bold: #1e293b;
            --text-muted: #64748b;
            --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04), 0 8px 15px -6px rgba(0, 0, 0, 0.04);
            --border-radius: 20px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
            padding-top: 100px;
        }

        /* Soft Navigation */
        .navbar {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.03);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: -1.5px;
            color: var(--primary) !important;
            font-size: 1.8rem;
        }

        .nav-link {
            font-weight: 600;
            color: var(--text-muted) !important;
            margin: 0 0.5rem;
            padding: 0.5rem 1rem !important;
            transition: all 0.3s ease;
            border-radius: 12px;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--primary) !important;
            background: rgba(139, 92, 246, 0.05);
        }

        /* Elegant Cards */
        .card {
            background: white;
            border: none;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 2rem;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
        }

        /* Soft Typography */
        h1, h2, h3, h4, h5 {
            color: var(--text-bold);
            font-weight: 800;
            letter-spacing: -1px;
        }

        .display-2 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Soft Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0.8rem 2rem;
            font-weight: 700;
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.2);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 25px -5px rgba(139, 92, 246, 0.3);
            background: linear-gradient(135deg, #7c3aed, #8b5cf6);
        }

        .btn-outline-primary {
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 14px;
            padding: 0.8rem 2rem;
            font-weight: 700;
        }

        .btn-outline-primary:hover {
            background-color: var(--primary);
            color: white;
        }

        .section-title {
            display: inline-block;
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .badge-skill {
            background: white;
            color: var(--primary);
            border: 1px solid rgba(139, 92, 246, 0.1);
            padding: 0.6rem 1.2rem;
            border-radius: 14px;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            display: inline-block;
            margin: 0.4rem;
        }

        footer {
            background: white;
            color: var(--text-muted);
            border-top: 1px solid rgba(0,0,0,0.03);
            padding: 60px 0;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(253, 164, 175, 0.03) 0%, transparent 50%);
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">OLENA.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'projects' %}">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'certifications' %}">Certifications</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'skills' %}">Skills</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'resume' %}">Resume</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-primary px-4 mt-2 mt-lg-0" href="{% url 'contact' %}">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Lightbox Modal -->
    <div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content bg-transparent border-0">
                <div class="modal-body p-0 text-center">
                    <img src="" id="lightboxImg" class="img-fluid border border-4 border-dark shadow-lg">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container text-center">
            <div class="mb-4">
                {% if profile.linkedin %}
                    <a href="{{ profile.linkedin }}" target="_blank" class="text-white me-3 fs-4"><i class="bi bi-linkedin"></i></a>
                {% endif %}
                {% if profile.github %}
                    <a href="{{ profile.github }}" target="_blank" class="text-white me-3 fs-4"><i class="bi bi-github"></i></a>
                {% endif %}
            </div>
            <p class="text-white opacity-50 mb-0">&copy; 2026 Olena Makarova. MSIS @ Baylor University.</p>
        </div>
    </footer>

    <!-- Lightbox Script -->
    <script>
        document.addEventListener('click', function (e) {
            if (e.target.classList.contains('lightbox-trigger')) {
                const src = e.target.getAttribute('src');
                document.getElementById('lightboxImg').setAttribute('src', src);
                const modal = new bootstrap.Modal(document.getElementById('lightboxModal'));
                modal.show();
            }
        });
    </script>

    <!-- Chatbase Chatbot -->
    <script>
    (function(){if(!window.chatbase||window.chatbase("getState")!=="initialized"){window.chatbase=(...arguments)=>{if(!window.chatbase.q){window.chatbase.q=[]}window.chatbase.q.push(arguments)};window.chatbase=new Proxy(window.chatbase,{get(target,prop){if(prop==="q"){return target.q}return(...args)=>target(prop,...args)}})}const onLoad=function(){const script=document.createElement("script");script.src="https://www.chatbase.co/embed.min.js";script.id="0sxy1LszoNGN3eEgmu7Kj";script.domain="www.chatbase.co";document.body.appendChild(script)};if(document.readyState==="complete"){onLoad()}else{window.addEventListener("load",onLoad)}})();
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
